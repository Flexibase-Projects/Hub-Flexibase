# Supabase MCP — instância local (CLI / docker) na LAN do time.
# Docs: https://supabase.com/docs/guides/getting-started/mcp
# Ajuste o host se o API do Supabase não for 192.168.1.220.
[mcp_servers.supabase]
url = "http://192.168.1.220:54321/mcp"
enabled = true
required = false
startup_timeout_sec = 20
tool_timeout_sec = 120

# Alternativa — Supabase Cloud (descomente e preencha project_ref do dashboard):
# [mcp_servers.supabase_cloud]
# url = "https://mcp.supabase.com/mcp?project_ref=SEU_PROJECT_REF&features=database,docs,development&read_only=true"
# enabled = false
# required = false
# startup_timeout_sec = 20
# tool_timeout_sec = 120
